<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>E-Book Viewer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400&family=DM+Mono:wght@300;400&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0c0a;
  --paper:#f7f2ea;
  --ink:#1c1712;
  --gold:#c8a45a;
  --gold2:#e8d4a0;
  --dim:rgba(255,255,255,0.18);
  --shadow:rgba(0,0,0,0.7);
}

html,body{
  width:100%;height:100%;
  background:var(--bg);
  font-family:'DM Mono',monospace;
  overflow:hidden;
  touch-action:none;
}

/* ── 배경 ── */
body::after{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 70% 50% at 15% 85%,rgba(200,164,90,.07),transparent 55%),
    radial-gradient(ellipse 50% 70% at 85% 15%,rgba(200,164,90,.05),transparent 55%);
  pointer-events:none;
}

/* ── 전체 레이아웃 ── */
#app{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  align-items:center;
}

/* ── 상단 바 ── */
#topbar{
  width:100%;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px 10px;
  background:linear-gradient(to bottom,rgba(14,12,10,.98),rgba(14,12,10,.6));
  flex-shrink:0;
  z-index:20;
}
.brand{
  font-family:'Noto Serif KR',serif;
  font-size:.85rem;font-weight:300;
  color:var(--gold);letter-spacing:.12em;
}
#page-info{
  font-size:.6rem;letter-spacing:.22em;
  text-transform:uppercase;color:var(--dim);
}
#btn-toc{
  font-size:.58rem;letter-spacing:.15em;text-transform:uppercase;
  color:rgba(200,164,90,.5);background:none;
  border:1px solid rgba(200,164,90,.2);
  padding:.25rem .7rem;cursor:pointer;
  transition:all .2s;font-family:'DM Mono',monospace;
}
#btn-toc:hover{color:var(--gold);border-color:rgba(200,164,90,.5)}

/* ── 페이지 영역 ── */
#stage{
  flex:1;width:100%;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}

/* 페이지 카드 */
.page-card{
  position:absolute;
  max-width:min(520px, 90vw);
  max-height:calc(100vh - 130px);
  width:auto;height:auto;
  border-radius:2px;
  overflow:hidden;
  box-shadow:
    0 4px 6px rgba(0,0,0,.3),
    0 20px 60px rgba(0,0,0,.6),
    0 0 0 1px rgba(200,164,90,.08);
  background:var(--paper);
  transform-origin:center center;
  transition:transform .45s cubic-bezier(.25,.46,.45,.94),
             opacity .45s cubic-bezier(.25,.46,.45,.94);
  will-change:transform,opacity;
  user-select:none;
  -webkit-user-select:none;
}
.page-card img{
  display:block;
  max-width:min(520px,90vw);
  max-height:calc(100vh - 130px);
  width:auto;height:auto;
  object-fit:contain;
  pointer-events:none;
  background:var(--paper);
}

/* 애니메이션 상태 */
.page-card.enter-from-right{transform:translateX(100%) scale(.94);opacity:0}
.page-card.enter-from-left {transform:translateX(-100%) scale(.94);opacity:0}
.page-card.exit-to-left    {transform:translateX(-110%) scale(.9);opacity:0}
.page-card.exit-to-right   {transform:translateX(110%) scale(.9);opacity:0}
.page-card.active          {transform:translateX(0) scale(1);opacity:1}

/* 페이지 넘기는 힌트 오버레이 */
.tap-hint{
  position:absolute;inset:0;
  display:flex;pointer-events:none;z-index:5;
}
.tap-hint-left,.tap-hint-right{
  flex:1;opacity:0;transition:opacity .15s;
  display:flex;align-items:center;justify-content:center;
}
.tap-hint-left  {background:linear-gradient(to right,rgba(200,164,90,.08),transparent)}
.tap-hint-right {background:linear-gradient(to left, rgba(200,164,90,.08),transparent)}

/* ── 하단 컨트롤 ── */
#controls{
  width:100%;
  padding:10px 0 max(14px, env(safe-area-inset-bottom));
  background:linear-gradient(to top,rgba(14,12,10,.98),rgba(14,12,10,.6));
  display:flex;flex-direction:column;align-items:center;gap:10px;
  flex-shrink:0;z-index:20;
}

/* 프로그레스 바 */
#progress-wrap{
  width:min(420px,80vw);
  height:2px;background:rgba(200,164,90,.15);
  position:relative;cursor:pointer;border-radius:1px;
}
#progress-bar{
  height:100%;background:var(--gold);border-radius:1px;
  transition:width .3s ease;
}
#progress-thumb{
  position:absolute;top:50%;right:0;
  width:8px;height:8px;border-radius:50%;
  background:var(--gold);
  transform:translate(50%,-50%);
  box-shadow:0 0 8px rgba(200,164,90,.6);
  pointer-events:none;
}

/* 이동 버튼 */
#nav-row{
  display:flex;align-items:center;gap:20px;
}
.nav-btn{
  width:42px;height:42px;border-radius:50%;
  border:1px solid rgba(200,164,90,.25);
  background:rgba(200,164,90,.06);
  color:var(--gold2);
  font-size:1.2rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
  -webkit-tap-highlight-color:transparent;
}
.nav-btn:hover,.nav-btn:active{
  border-color:rgba(200,164,90,.7);
  background:rgba(200,164,90,.15);
  box-shadow:0 0 16px rgba(200,164,90,.2);
}
.nav-btn:disabled{opacity:.2;cursor:default;pointer-events:none}

#page-num{
  font-size:.62rem;letter-spacing:.2em;
  color:var(--dim);min-width:70px;text-align:center;
}

/* ── 로딩 ── */
#loading{
  position:fixed;inset:0;z-index:100;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:1.5rem;
  background:var(--bg);
}
#loading.hidden{display:none}
.loading-label{
  font-family:'Noto Serif KR',serif;
  color:var(--gold2);font-size:1.1rem;
  letter-spacing:.1em;font-weight:300;
}
.loading-track{
  width:160px;height:1px;
  background:rgba(200,164,90,.15);
  position:relative;overflow:hidden;
}
.loading-track::after{
  content:'';position:absolute;left:-100%;top:0;
  width:100%;height:100%;background:var(--gold);
  animation:sweep 1.1s ease-in-out infinite;
}
@keyframes sweep{0%{left:-100%}100%{left:100%}}

/* ── 에러 ── */
#error-msg{
  position:fixed;inset:0;z-index:200;
  display:none;flex-direction:column;
  align-items:center;justify-content:center;gap:1.2rem;
  background:var(--bg);padding:2rem;text-align:center;
}
#error-msg.show{display:flex}
.err-title{font-family:'Noto Serif KR',serif;color:var(--gold);font-size:1.3rem;font-weight:300}
.err-body{font-size:.68rem;color:var(--dim);line-height:1.9;letter-spacing:.05em}
.err-code{
  font-size:.6rem;color:rgba(200,164,90,.35);
  border:1px solid rgba(200,164,90,.15);
  padding:.6rem 1.2rem;border-radius:2px;
  line-height:1.8;text-align:left;
}

/* 스와이프 드래그 중 */
.page-card.dragging{transition:none !important}
</style>
</head>
<body>

<div id="loading">
  <div class="loading-label">페이지 불러오는 중…</div>
  <div class="loading-track"></div>
</div>

<div id="error-msg">
  <div class="err-title">페이지를 불러오지 못했어요</div>
  <div class="err-body">
    <code class="err-code">pages/list.json</code> 파일이 없거나<br>
    <code>pages/</code> 폴더에 이미지/PDF가 없습니다.<br><br>
    아래 구조를 확인해주세요:
  </div>
  <div class="err-code">
    📁 Ebooks/<br>
    ├── index.html<br>
    └── 📁 pages/<br>
    &nbsp;&nbsp;&nbsp;&nbsp;├── 01.jpg<br>
    &nbsp;&nbsp;&nbsp;&nbsp;├── 02.png<br>
    &nbsp;&nbsp;&nbsp;&nbsp;└── 03.jpg
  </div>
  <div class="err-code" id="err-detail" style="color:rgba(200,164,90,.5);font-size:.55rem"></div>
</div>

<div id="app">
  <div id="topbar">
    <div class="brand">E · Book</div>
    <div id="page-info">— / —</div>
    <button id="btn-toc">목차</button>
  </div>

  <div id="stage">
    <div class="tap-hint">
      <div class="tap-hint-left" id="hint-left"></div>
      <div class="tap-hint-right" id="hint-right"></div>
    </div>
  </div>

  <div id="controls">
    <div id="progress-wrap">
      <div id="progress-bar" style="width:0%"></div>
      <div id="progress-thumb"></div>
    </div>
    <div id="nav-row">
      <button class="nav-btn" id="btn-first" title="처음">⟨⟨</button>
      <button class="nav-btn" id="btn-prev"  title="이전">‹</button>
      <div id="page-num">— / —</div>
      <button class="nav-btn" id="btn-next"  title="다음">›</button>
      <button class="nav-btn" id="btn-last"  title="끝">⟩⟩</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════
//  설정: pages/ 폴더 안의 파일 목록
//  → 파일을 추가하면 여기 배열에 추가하세요
//  → 또는 pages/list.json 파일을 사용하세요
// ════════════════════════════════════════
const MANUAL_LIST = [
  // 예시: "pages/01.jpg", "pages/02.png"
  // 비워두면 list.json 자동 시도
];

// ════════════════════════════════════════
const stage     = document.getElementById('stage');
const loading   = document.getElementById('loading');
const errorMsg  = document.getElementById('error-msg');
const pageInfo  = document.getElementById('page-info');
const pageNum   = document.getElementById('page-num');
const progressBar   = document.getElementById('progress-bar');
const progressThumb = document.getElementById('progress-thumb');

let pages   = [];   // {src, type} 배열
let current = 0;
let cardEl  = null;
let isAnim  = false;

// ── 초기화 ──
async function init(){
  try{
    let list = MANUAL_LIST.length ? MANUAL_LIST : await fetchList();
    if(!list || !list.length) throw new Error('파일 목록이 비어있습니다');
    pages = list.map(src=>({src, type: src.toLowerCase().endsWith('.pdf')?'pdf':'img'}));
    hideLoading();
    await showPage(0, 'none');
  } catch(e){
    showError(e.message);
  }
}

async function fetchList(){
  // list.json 시도
  try{
    const r = await fetch('pages/list.json');
    if(r.ok){
      const j = await r.json();
      return Array.isArray(j) ? j : j.pages;
    }
  } catch(_){}
  throw new Error('pages/list.json 을 찾을 수 없습니다.\nMANUAL_LIST 배열에 파일을 직접 입력하거나\nlist.json 파일을 추가해주세요.');
}

function hideLoading(){ loading.classList.add('hidden'); }
function showError(msg){
  hideLoading();
  errorMsg.classList.add('show');
  document.getElementById('err-detail').textContent = msg;
}

// ── 페이지 렌더 ──
async function showPage(idx, dir){
  if(idx<0||idx>=pages.length) return;
  isAnim = true;

  const p = pages[idx];
  const newCard = document.createElement('div');
  newCard.className = 'page-card';

  if(p.type === 'img'){
    const img = document.createElement('img');
    img.src = p.src;
    img.alt = `페이지 ${idx+1}`;
    img.draggable = false;
    await new Promise((res,rej)=>{ img.onload=res; img.onerror=rej; });
    newCard.appendChild(img);
  } else {
    // PDF → iframe
    const iframe = document.createElement('iframe');
    iframe.src = p.src + '#toolbar=0&navpanes=0&scrollbar=0';
    iframe.style.cssText = `width:min(520px,90vw);height:calc(100vh - 130px);border:none;background:var(--paper)`;
    newCard.appendChild(iframe);
  }

  // 애니메이션 진입
  if(dir==='right') newCard.classList.add('enter-from-right');
  else if(dir==='left') newCard.classList.add('enter-from-left');

  stage.appendChild(newCard);

  // 이전 카드 퇴장
  if(cardEl){
    const old = cardEl;
    if(dir==='right') old.classList.add('exit-to-left');
    else if(dir==='left') old.classList.add('exit-to-right');
    setTimeout(()=>old.remove(), 480);
  }

  // 새 카드 등장
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      newCard.classList.remove('enter-from-right','enter-from-left');
      newCard.classList.add('active');
    });
  });

  cardEl  = newCard;
  current = idx;
  updateUI();

  setTimeout(()=>{ isAnim=false; }, 480);
}

function updateUI(){
  const n = pages.length;
  const c = current+1;
  pageInfo.textContent = `${c} / ${n}`;
  pageNum.textContent  = `${c} / ${n}`;

  const pct = n>1 ? ((current/(n-1))*100) : 100;
  progressBar.style.width  = pct+'%';
  progressThumb.style.left = pct+'%';
  progressThumb.style.right= 'auto';

  document.getElementById('btn-prev').disabled  = current===0;
  document.getElementById('btn-first').disabled = current===0;
  document.getElementById('btn-next').disabled  = current===n-1;
  document.getElementById('btn-last').disabled  = current===n-1;
}

// ── 네비게이션 ──
function goNext(){ if(!isAnim && current<pages.length-1) showPage(current+1,'right'); }
function goPrev(){ if(!isAnim && current>0)              showPage(current-1,'left');  }

document.getElementById('btn-next') .addEventListener('click', goNext);
document.getElementById('btn-prev') .addEventListener('click', goPrev);
document.getElementById('btn-first').addEventListener('click', ()=>{ if(!isAnim) showPage(0,'left'); });
document.getElementById('btn-last') .addEventListener('click', ()=>{ if(!isAnim) showPage(pages.length-1,'right'); });

// 키보드
document.addEventListener('keydown', e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown') goNext();
  if(e.key==='ArrowLeft' ||e.key==='ArrowUp')   goPrev();
});

// 프로그레스 클릭
document.getElementById('progress-wrap').addEventListener('click', e=>{
  const rect = e.currentTarget.getBoundingClientRect();
  const ratio = (e.clientX - rect.left) / rect.width;
  const idx = Math.round(ratio * (pages.length-1));
  if(!isAnim) showPage(Math.max(0,Math.min(idx,pages.length-1)), idx>current?'right':'left');
});

// ── 스와이프 ──
let touchStartX=0, touchStartY=0, touchDeltaX=0, isDragging=false;

stage.addEventListener('touchstart', e=>{
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  touchDeltaX = 0;
  isDragging  = false;
}, {passive:true});

stage.addEventListener('touchmove', e=>{
  const dx = e.touches[0].clientX - touchStartX;
  const dy = e.touches[0].clientY - touchStartY;
  if(!isDragging && Math.abs(dx)>8 && Math.abs(dx)>Math.abs(dy)){
    isDragging=true;
    if(cardEl) cardEl.classList.add('dragging');
  }
  if(isDragging){
    touchDeltaX = dx;
    if(cardEl) cardEl.style.transform = `translateX(${dx*.4}px) scale(${1-Math.abs(dx)*.0003})`;
  }
}, {passive:true});

stage.addEventListener('touchend', e=>{
  if(cardEl){ cardEl.classList.remove('dragging'); cardEl.style.transform=''; }
  if(isDragging){
    if(touchDeltaX < -50) goNext();
    else if(touchDeltaX > 50) goPrev();
  }
  isDragging=false;
}, {passive:true});

// 목차 (추후 확장용)
document.getElementById('btn-toc').addEventListener('click', ()=>{
  const list = pages.map((p,i)=>`${i+1}. ${p.src.split('/').pop()}`).join('\n');
  alert('📖 페이지 목록\n\n'+list);
});

init();
</script>
</body>
</html>
